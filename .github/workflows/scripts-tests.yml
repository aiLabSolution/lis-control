# Umbrella-side agent tooling under scripts/ (slice harness, Plane issue helper) is
# stdlib-only Python. This job runs its unit tests on every change under scripts/ so the
# agent-facing tooling has a green gate — the other workflows are path-filtered to
# edge/sim/** and core/openelis and never see scripts/ changes. No external deps: the
# helpers are stdlib-only, so the tests run on plain `python -m unittest`.
name: scripts — unit tests

on:
  push:
    branches: [main]
    paths:
      - scripts/**
      - .github/workflows/scripts-tests.yml
  pull_request:
    paths:
      - scripts/**
      - .github/workflows/scripts-tests.yml
  workflow_dispatch:

concurrency:
  group: scripts-tests-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  unittest:
    name: python -m unittest (scripts/)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout umbrella (lis-control)
        uses: actions/checkout@v4
        # No submodules: the helpers are umbrella-side and self-contained.

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tests
        run: python -m unittest discover -s scripts -p 'test_*.py' -v
